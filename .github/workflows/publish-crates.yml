name: Publish crates

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish crates to crates.io instead of validation only.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish-crates:
    name: Validate and publish crates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Public repository audit
        run: scripts/public-release-audit.sh

      - name: Format check
        run: cargo fmt --check

      - name: Test workspace
        run: cargo test --workspace

      - name: Package core dry run
        run: |
          core_version="$(cargo pkgid -p agent-sdk-core | sed 's/.*@//')"
          status="$(curl -sS -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/agent-sdk-core/${core_version}")"
          if [[ "$status" == "200" ]]; then
            echo "agent-sdk-core ${core_version} is already on crates.io; skipping dry run."
          else
            cargo publish -p agent-sdk-core --dry-run
          fi

      - name: Decide publish mode
        id: publish-mode
        run: |
          if [[ "${{ github.event_name }}" == "release" || "${{ inputs.publish }}" == "true" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish crates
        if: steps.publish-mode.outputs.publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN repository secret is not configured." >&2
            exit 1
          fi

          crate_version() {
            cargo pkgid -p "$1" | sed 's/.*@//'
          }

          crate_exists() {
            local name="$1"
            local version="$2"
            local status
            status="$(curl -sS -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/${name}/${version}")"
            [[ "$status" == "200" ]]
          }

          publish_if_missing() {
            local name="$1"
            local version="$2"

            if crate_exists "$name" "$version"; then
              echo "${name} ${version} is already on crates.io; skipping."
              return 0
            fi

            cargo publish -p "$name" --token "$CARGO_REGISTRY_TOKEN"
          }

          core_version="$(crate_version agent-sdk-core)"
          toolkit_version="$(crate_version agent-sdk-toolkit)"

          publish_if_missing agent-sdk-core "$core_version"

          for attempt in {1..24}; do
            if publish_if_missing agent-sdk-toolkit "$toolkit_version"; then
              exit 0
            fi

            if [[ "$attempt" == "24" ]]; then
              echo "agent-sdk-toolkit publish failed after dependency propagation retries." >&2
              exit 1
            fi

            echo "agent-sdk-toolkit publish attempt ${attempt} failed; waiting for registry propagation."
            sleep 15
          done
